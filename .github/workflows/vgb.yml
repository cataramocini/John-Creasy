name: VGB - Vigilante do Diario Oficial

on:
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC = 19:00 BRT
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: MyPy type check
        run: mypy src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v --cov=src/vgb --cov-report=term-missing

      - name: Security scan
        run: bandit -r src -f json -o bandit-report.json || true

  run:
    needs: [lint, test]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."

      - name: Restore VGB database cache
        uses: actions/cache/restore@v4
        with:
          path: vgb.db
          key: vgb-database-${{ github.run_id }}
          restore-keys: vgb-database-

      - name: Run VGB
        env:
          VGB_NOME_BUSCA: ${{ secrets.VGB_NOME_BUSCA }}
          VGB_CARGO_BUSCA: ${{ secrets.VGB_CARGO_BUSCA }}
          VGB_TELEGRAM_TOKEN: ${{ secrets.VGB_TELEGRAM_TOKEN }}
          VGB_TELEGRAM_CHAT_ID: ${{ secrets.VGB_TELEGRAM_CHAT_ID }}
          VGB_GEMINI_API_KEY: ${{ secrets.VGB_GEMINI_API_KEY }}
          VGB_OPENROUTER_API_KEY: ${{ secrets.VGB_OPENROUTER_API_KEY }}
          VGB_DIARIO_URL: ${{ secrets.VGB_DIARIO_URL }}
          VGB_DIARIO_BASE_URL: ${{ secrets.VGB_DIARIO_BASE_URL }}
          VGB_LOG_JSON: "true"
        run: python -m vgb.interface_cli

      - name: Save VGB database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vgb.db
          key: vgb-database-${{ github.run_id }}
